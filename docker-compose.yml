services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: llmref
      POSTGRES_USER: llmref
      POSTGRES_PASSWORD: llmref
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U llmref"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=postgresql+asyncpg://llmref:llmref@postgres:5432/llmref
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app

  mcp:
    build: ./backend
    # Read-only MCP server over stdio — clients spawn this process, no port.
    command: python -m app.mcp
    stdin_open: true
    tty: true
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=postgresql+asyncpg://llmref:llmref@postgres:5432/llmref
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - BACKEND_API_URL=http://api:8000
    depends_on:
      - api

volumes:
  postgres_data:
