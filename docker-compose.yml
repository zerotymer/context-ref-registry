services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: llmref
      POSTGRES_USER: llmref
      POSTGRES_PASSWORD: llmref
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U llmref"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=postgresql+asyncpg://llmref:llmref@postgres:5432/llmref
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  # MCP is served by the `api` service as a streamable-http endpoint at
  # :8000/mcp (read-only, API key auth). No separate stdio service.

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - BACKEND_API_URL=http://api:8000
    depends_on:
      - api

  backup:
    build:
      context: ./backup
    environment:
      - PGHOST=postgres
      - PGPORT=5432
      - PGUSER=llmref
      - PGPASSWORD=llmref
      - PGDATABASE=llmref
      - BACKUP_SCHEDULE=0 2 * * *
      - BACKUP_RETAIN_DAYS=7
    volumes:
      - backup_data:/backups
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  backup_data:
