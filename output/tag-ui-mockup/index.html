<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tag UI Mockup — 목차</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center">
  <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-8 w-full max-w-sm">
    <h1 class="font-semibold text-gray-900 text-lg mb-1">태그 UI 목업</h1>
    <p class="text-xs text-gray-400 mb-6">Tag feature mockup — 2026-05-28</p>
    <div class="space-y-2">
      <a href="entities.html"
        class="flex items-center justify-between px-4 py-3 rounded-lg border border-gray-200 hover:border-indigo-400 hover:bg-indigo-50 group">
        <div>
          <div class="font-medium text-gray-800 group-hover:text-indigo-700 text-sm">Entity 목록</div>
          <div class="text-xs text-gray-400 mt-0.5">태그 필터 · 행 내 태그 chip · 새 Entity 모달 태그 입력</div>
        </div>
        <svg class="w-4 h-4 text-gray-300 group-hover:text-indigo-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
      </a>
      <a href="entity-detail.html"
        class="flex items-center justify-between px-4 py-3 rounded-lg border border-gray-200 hover:border-indigo-400 hover:bg-indigo-50 group">
        <div>
          <div class="font-medium text-gray-800 group-hover:text-indigo-700 text-sm">Entity 상세</div>
          <div class="text-xs text-gray-400 mt-0.5">메타바 인라인 태그 표시 · + 추가 · × 삭제</div>
        </div>
        <svg class="w-4 h-4 text-gray-300 group-hover:text-indigo-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
      </a>
    </div>
  </div>
</body>
</html>
