name: Validate Registry References

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  validate-refs:
    name: Validate PR References
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Get PR diff
        run: git diff origin/${{ github.base_ref }}...HEAD > /tmp/pr.diff

      - name: Validate registry references
        env:
          REGISTRY_URL: ${{ vars.REGISTRY_URL }}
          REGISTRY_API_KEY: ${{ secrets.REGISTRY_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: python ci/validate-pr-refs.py /tmp/pr.diff
        # Exits 0 if all valid, 1 if any missing/ambiguous.
        # Remove `continue-on-error` to fail the check on invalid refs.
        continue-on-error: true
